name: Achilles
options:
  bundleIdPrefix: com.tirnara
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_CFBundleDisplayName: Achilles HQ
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
targets:
  Achilles:
    type: application
    platform: iOS
    sources:
      - path: Achilles
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Achilles/Resources/Assets.xcassets
      - path: Achilles/Resources/LaunchScreen.storyboard
      - path: Achilles/Data
        buildPhase: resources
    dependencies:
      - package: Firebase
        product: FirebaseCrashlytics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tirnara.achilles
        GENERATE_INFOPLIST_FILE: true
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Y9H4MZWXM6
  AchillesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AchillesTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Achilles
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tirnara.achilles.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Achilles.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Achilles"
        BUNDLE_LOADER: "$(TEST_HOST)"
